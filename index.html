<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projet Tailwind</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-900 text-slate-100">
    <main class="flex min-h-screen items-center justify-center px-4">
      <section class="w-full max-w-xl rounded-2xl border border-slate-700 bg-slate-800 p-8 shadow-2xl">
        <p class="mb-3 text-sm font-semibold uppercase tracking-[0.3em] text-cyan-400">Tailwind CSS</p>
        <h1 class="text-3xl font-bold sm:text-4xl">Votre projet est prêt à utiliser Tailwind.</h1>
        <p class="mt-4 text-slate-300">
          Ajoutez simplement des classes Tailwind dans votre HTML et tout fonctionnera.
        </p>
        <button class="mt-6 rounded-lg bg-cyan-500 px-4 py-2 font-semibold text-slate-950 transition hover:bg-cyan-400">
          Essai rapide
        </button>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
